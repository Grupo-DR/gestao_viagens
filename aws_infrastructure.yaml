AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestrutura mínima para o frontend gestao_viagens usando DynamoDB.

Resources:
  TravelRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TravelRequests
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: requesterId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RequesterIndex
          KeySchema:
            - AttributeName: requesterId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  DynamoDbIamPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: TravelRequestsFrontendDynamoPolicy
      Description: "Permite acesso mínimo à tabela TravelRequests para o frontend serverless direto ao DynamoDB."
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:Scan
              - dynamodb:Query
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
            Resource:
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/TravelRequests
              - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/TravelRequests/index/RequesterIndex
